services:
  nutrition-postgres:
    image: postgres:16
    container_name: nutrition-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - nutrition-postgres-data:/var/lib/postgresql/data

  nutrition-pgadmin:
    image: dpage/pgadmin4:8
    container_name: nutrition-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:?PGADMIN_DEFAULT_EMAIL is required}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:?PGADMIN_DEFAULT_PASSWORD is required}
    ports:
      - "5050:80"
    depends_on:
      - nutrition-postgres

volumes:
  nutrition-postgres-data: