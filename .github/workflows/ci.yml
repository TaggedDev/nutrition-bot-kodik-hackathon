name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  dotnet-and-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Nutrition.Web.sln

      - name: Check editorconfig style
        run: dotnet format Nutrition.Web.sln style --verify-no-changes --severity warn --no-restore

      - name: Build
        run: dotnet build Nutrition.Web.sln --configuration Release --no-restore

      - name: Run unit and web tests
        run: >-
          dotnet test Nutrition.Web.sln
          --configuration Release
          --no-build
          --filter "Category!=Integration&Category!=LiveSmoke"
          --collect "XPlat Code Coverage"
          --logger trx
          --results-directory artifacts/test-results

      - name: Upload .NET test results and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-test-results
          path: artifacts/test-results
          if-no-files-found: error

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: src/nutrition-frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/nutrition-frontend
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: src/nutrition-frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        working-directory: src/nutrition-frontend
        run: npm run test:e2e

      - name: Stop E2E stack
        if: always()
        run: docker compose -f compose.e2e.yml down --volumes

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            src/nutrition-frontend/playwright-report
            src/nutrition-frontend/test-results
          if-no-files-found: ignore

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Nutrition.Web.sln

      - name: Build
        run: dotnet build Nutrition.Web.sln --configuration Release --no-restore

      - name: Verify Docker is available
        run: docker info

      - name: Run integration tests
        run: >-
          dotnet test tests/Nutrition.Integration.Tests/Nutrition.Integration.Tests.csproj
          --configuration Release
          --no-build
          --filter "Category=Integration"
          --logger trx
          --results-directory artifacts/integration-test-results

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: artifacts/integration-test-results
          if-no-files-found: error
